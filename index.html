<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unggah File Modern</title>
    <!-- Menggunakan Tailwind CSS untuk styling cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4 border border-slate-100">
        <!-- Header -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Unggah File</h2>
            <p class="text-sm text-slate-500 mt-1">Pilih file dokumen atau gambar untuk diunggah</p>
        </div>

        <!-- Form Upload -->
        <form action="upload.php" method="post" enctype="multipart/form-data" class="space-y-5">
            
            <!-- Area Dropzone / Pilih File -->
            <div class="relative group">
                <label for="fileToUpload" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-blue-400 transition-all duration-200">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <!-- Ikon Upload Sederhana -->
                        <svg class="w-10 h-10 mb-3 text-slate-400 group-hover:text-blue-500 transition-colors duration-200" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                        </svg>
                        <p class="mb-1 text-sm text-slate-700 font-semibold">Klik untuk memilih file</p>
                        <p id="file-name" class="text-xs text-slate-400 truncate max-w-xs">atau seret (drag & drop) file ke sini</p>
                    </div>
                    <!-- Input file disembunyikan secara visual tapi tetap berfungsi -->
                    <input type="file" name="fileToUpload" id="fileToUpload" class="absolute inset-0 opacity-0 cursor-pointer" onchange="updateFileName()">
                </label>
            </div>

            <!-- Tombol Submit -->
            <button type="submit" name="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-md shadow-blue-200 hover:shadow-lg transition-all duration-200 focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
                Unggah Sekarang
            </button>
        </form>
    </div>

    <!-- Script receh untuk memunculkan nama file setelah dipilih -->
    <script>
        function updateFileName() {
            const input = document.getElementById('fileToUpload');
            const fileNameDisplay = document.getElementById('file-name');
            if (input.files.length > 0) {
                fileNameDisplay.textContent = "File terpilih: " + input.files[0].name;
                fileNameDisplay.classList.remove('text-slate-400');
                fileNameDisplay.classList.add('text-blue-600', 'font-medium');
            }
        }
    </script>

</body>
</html>
